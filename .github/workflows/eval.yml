# Agent Evaluation
#
# Runs the LangSmith-native evaluation harness (agent_eval/) on every push to
# main. Uploads the golden dataset, then runs the agent experiment against it.
# Failure here must NOT block merges — it is a signal, not a gate.
name: Agent Evaluation

on:
  push:
    branches: [main]
    paths:
      - 'backend/src/agent/**'
      - 'backend/agent_eval/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  evaluate:
    name: Run LangSmith Agent Evaluation
    runs-on: ubuntu-latest
    # Postgres service container for agent tool queries (portfolio, OHLCV, etc.)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stocklens
          POSTGRES_USER: stocklens
          POSTGRES_PASSWORD: stocklens
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # Evaluation regressions should warn, not block the pipeline.
    continue-on-error: true
    env:
      LANGCHAIN_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGCHAIN_TRACING_V2: 'true'
      LANGCHAIN_PROJECT: stocklens-agent
      # Required by Settings() at import time even though eval doesn't sign JWTs.
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'eval-ci-dummy-key-not-for-production' }}
      # Point to the Postgres service container instead of RDS.
      DATABASE_URL: postgresql+asyncpg://stocklens:stocklens@localhost:5432/stocklens
      # Alembic uses TEST_DATABASE_URL when ENVIRONMENT=test
      ENVIRONMENT: development
      # No Redis in CI — the cache layer degrades gracefully.
      REDIS_URL: 'redis://localhost:6379/0'
      # Use the eval region (eu-west-2 — the app's home region).
      AWS_REGION: eu-west-2
      # yfinance needs HTTPS
      REQUESTS_CA_BUNDLE: ''

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync backend environment
        working-directory: backend
        run: |
          set -euo pipefail
          uv sync --package stocklens-backend --all-extras --index-strategy unsafe-best-match

      - name: Run database migrations
        working-directory: backend
        run: |
          set -euo pipefail
          uv run alembic upgrade head

      - name: Seed eval test data
        working-directory: backend
        run: |
          set -euo pipefail
          uv run python scripts/seed_eval.py

      - name: Upload golden dataset
        working-directory: backend
        run: uv run python -m agent_eval.upload_dataset

      - name: Run experiment
        working-directory: backend
        run: uv run python -m agent_eval.run_experiment
