# StockLens CD — Build, Scan & Deploy
# Triggered after CI passes. Builds ARM64 image, pushes to ECR,
# scans for vulns, then terraform applies to ECS.
# Production environment requires manual approval.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: stocklens-dev
  TERRAFORM_DIR: terraform

permissions:
  id-token: write # OIDC token for AWS credentials
  contents: read # checkout

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Build features-engine Rust wheel (shared across images) ──────
  build-features-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3

      - name: Build features-engine ARM64 wheel
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f backend/Dockerfile \
            --target rust-builder \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=tar,dest=/tmp/wheels.tar \
            backend/
          mkdir -p /tmp/wheel-extract wheels/wheels
          tar -xf /tmp/wheels.tar -C /tmp/wheel-extract
          cp /tmp/wheel-extract/wheels/features_engine*.whl wheels/wheels/
          ls -la wheels/wheels/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: features-engine-wheel
          path: wheels/
          retention-days: 1

  # ─── Build & Push ARM64 Backend Image (for ECS) ───────────────────
  build-push-backend:
    needs: [build-features-engine]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for ARM64 emulation
        # ADR 009: QEMU required for linux/arm64 builds on x86 runners
        uses: docker/setup-qemu-action@v3

      - name: Download pre-built features-engine wheel
        uses: actions/download-artifact@v4
        with:
          name: features-engine-wheel
          path: wheels

      - name: Build and push ARM64 backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/arm64
          push: true
          build-contexts: |
            wheel-source=${{ github.workspace }}/wheels
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Build & Push Airflow ARM64 Image ────────────────────────────
  build-push-airflow:
    needs: [build-features-engine]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3

      - name: Download pre-built features-engine wheel
        uses: actions/download-artifact@v4
        with:
          name: features-engine-wheel
          path: wheels

      - name: Build and push Airflow ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: airflow/Dockerfile
          platforms: linux/arm64
          push: true
          build-contexts: |
            wheel-source=${{ github.workspace }}/wheels
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:airflow-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:airflow-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Build & Push ML Training Image (x86_64 GPU) ──────────────────
  build-push-ml-training:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free disk space
        # GitHub Free runners have ~14GB but ship Android SDK (~10GB) + .NET (~5GB) + GHC (~1GB).
        # Removing these frees ~16GB for CUDA PyTorch + Rust build.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          df -h /

      - name: Build and push ML training image
        uses: docker/build-push-action@v5
        with:
          context: backend/ml
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:ml-training-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:ml-training-latest
          cache-from: type=gha
          cache-to: type=gha,mode=min

  # ─── Build & Push SageMaker ARM64 Image (for SageMaker endpoint) ────
  build-push-sagemaker:
    needs: [build-push-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push SageMaker ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/sagemaker/Dockerfile.sagemaker
          platforms: linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sagemaker-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sagemaker-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Container Image Security Scan (matrix: backend / airflow / ml-training / sagemaker) ─
  container-scan:
    needs: [build-push-backend, build-push-airflow, build-push-ml-training, build-push-sagemaker]
    strategy:
      matrix:
        include:
          - image: backend
            tag: ${{ github.sha }}
            platform: linux/arm64
          - image: airflow
            tag: airflow-${{ github.sha }}
            platform: linux/arm64
          - image: ml-training
            tag: ml-training-${{ github.sha }}
            platform: linux/amd64
          - image: sagemaker
            tag: sagemaker-${{ github.sha }}
            platform: linux/arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Free disk space for image extraction
        # Trivy extracts images to /tmp for analysis. GitHub Free runners have
        # ~14GB but ship Android SDK (~10GB) + .NET (~5GB) + GHC (~1GB).
        # Removing these frees ~16GB for large image extraction.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          df -h /

      - name: Pull image for scanning
        run: |
          docker pull --platform ${{ matrix.platform }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ matrix.tag }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ matrix.tag }}'
          severity: 'CRITICAL'
          exit-code: '1'
          trivyignores: '.trivyignore'

  # ─── Terraform Plan (review before deploy) ────────────────────────
  # Runs plan immediately, saves .tfplan artifact, and outputs plan
  # text to job summary. User reviews plan in GH UI before approving
  # the apply job below.
  terraform-plan:
    runs-on: ubuntu-latest
    needs: [container-scan]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.15'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Terraform init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Terraform plan
        id: plan
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          AIRFLOW_IMAGE_TAG="${REGISTRY}/${{ env.ECR_REPOSITORY }}:airflow-${{ github.sha }}"
          ML_TRAINING_IMAGE_TAG="${REGISTRY}/${{ env.ECR_REPOSITORY }}:ml-training-${{ github.sha }}"
          SAGEMAKER_IMAGE_TAG="${REGISTRY}/${{ env.ECR_REPOSITORY }}:sagemaker-${{ github.sha }}"
          # ponytail: -lock=false safe for read-only plan. CI concurrency
          # group (terraform-${{ github.ref }}) prevents parallel applies.
          # Exit code 2 = changes detected (not a failure in CI context).
          terraform plan -lock=false \
            -var="container_image=${IMAGE_TAG}" \
            -var="airflow_image=${AIRFLOW_IMAGE_TAG}" \
            -var="ml_training_image=${ML_TRAINING_IMAGE_TAG}" \
            -var="sagemaker_image=${SAGEMAKER_IMAGE_TAG}" \
            -var="champion_s3_uri=s3://stocklens-mlflow-artifacts-dev/champion" \
            -var="environment=dev" \
            -out=tfplan || { rc=$?; [ $rc -eq 2 ] && true || exit $rc; }
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Show plan summary
        run: |
          echo "### Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TERRAFORM_DIR }}/tfplan
          retention-days: 7

  # ─── Terraform Apply (requires manual approval) ───────────────────
  # Applies the saved plan from the plan job. Runs only after manual
  # approval via the production environment gate.
  terraform-apply:
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    environment: production # requires manual approval gate
    steps:
      - uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.15'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TERRAFORM_DIR }}

      - name: Terraform apply
        # Applies the reviewed plan. No retry loop — if it fails, fix the
        # issue and re-run (fresh plan generated for review).
        run: terraform apply tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}
