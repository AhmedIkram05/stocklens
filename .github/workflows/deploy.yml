# StockLens CD — Build, Scan & Deploy
# Triggered after CI passes. Builds ARM64 image, pushes to ECR,
# scans for vulns, then terraform applies to ECS.
# Production environment requires manual approval.

name: Deploy

on:
  push:
  pull_request:

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: stocklens-dev
  TERRAFORM_DIR: terraform

permissions:
  id-token: write # OIDC token for AWS credentials
  contents: read # checkout

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Build & Push ARM64 Image ─────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for ARM64 emulation
        # ADR 009: QEMU required for linux/arm64 builds on x86 runners
        uses: docker/setup-qemu-action@v3

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Container Image Security Scan ────────────────────────────────
  container-scan:
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # ─── Terraform Apply & ECS Deploy ─────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [container-scan, build-push]
    environment: production # requires manual approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Terraform init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Terraform apply
        run: |
          IMAGE_TAG="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          for i in 1 2 3; do
            terraform apply -auto-approve \
              -var="container_image=${IMAGE_TAG}" && break
            echo "Attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
        working-directory: ${{ env.TERRAFORM_DIR }}
