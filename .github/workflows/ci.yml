# CI
#
# Runs in parallel across all concerns: linting, type checking, testing
# with coverage, security auditing, Python backend checks, IaC scanning,
# Docker validation, and secret scanning. Every check must pass before merge.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Prettier check
        run: |
          node node_modules/prettier/bin/prettier.cjs --version
          node node_modules/prettier/bin/prettier.cjs --check .
      - run: ./node_modules/.bin/eslint frontend/src/

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Frontend Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test -- --coverage --coverageThreshold='{"global":{"branches":30,"functions":30,"lines":30,"statements":30}}'
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --omit=dev || true

  rust:
    name: Rust (features-engine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ml/features-engine
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-${{ matrix.target }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: pip install numpy
      - name: Clippy
        run: cargo clippy --all-features -- -D warnings
      - name: Tests
        run: cargo test

  python:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: stocklens
          POSTGRES_PASSWORD: stocklens
          POSTGRES_DB: stocklens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://stocklens:stocklens@localhost:5432/stocklens_test
      TEST_DATABASE_URL: postgresql+asyncpg://stocklens:stocklens@localhost:5432/stocklens_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: dev-test-secret-do-not-use-in-prod
      RATE_LIMIT_LOGIN: 10000/minute
      RATE_LIMIT_DEFAULT: 10000/minute
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-host
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up virtual environment
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/python -c "import sys; print(sys.executable)"
      - name: Ruff check
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/venv
        run: |
          uv pip install ruff
          ./venv/bin/ruff check backend/
          ./venv/bin/ruff format --check backend/
      - name: Build Rust extension
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/venv
          UV_LINK_MODE: copy
        run: |
          uv pip install maturin
          cd backend/ml/features-engine
          "${{ github.workspace }}/venv/bin/python" -m maturin build --release --out /tmp/wheels
      - name: Pytest
        run: |
          set -euo pipefail
          cd backend
          # Only sync stocklens-backend workspace member (not ml/ with mlflow).
          # mlflow-skinny pins requests==2.28.1, conflicts with yfinance>=2.31.
          UV_LINK_MODE=copy uv sync --frozen --package stocklens-backend --all-extras
          uv pip install /tmp/wheels/features_engine-*.whl
          uv run pytest -q \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=lcov:coverage/lcov.info \
            --cov-report=term-missing \
            --cov-fail-under=30
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/lcov.info,./backend/coverage.xml
          flags: backend
          fail_ci_if_error: true

  docker:
    name: Docker Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create .env from example
        run: cp backend/.env.example backend/.env
      - name: Validate docker-compose.yml
        run: docker compose config --quiet
      - name: Install hadolint
        run: |
          curl -sSL -o /tmp/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /tmp/hadolint
          sudo mv /tmp/hadolint /usr/local/bin/hadolint
      - name: Lint Dockerfiles
        run: |
          find . -name 'Dockerfile*' -not -path './.git/*' -not -path './node_modules/*' | xargs -r hadolint

  iac:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
      - name: tfsec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          curl -sSL -o /tmp/tfsec \
            https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64
          chmod +x /tmp/tfsec
          /tmp/tfsec terraform/ \
            --soft-fail \
            -e aws-elb-http-not-used,aws-ecs-no-plaintext-secrets,aws-ec2-no-public-egress-sgr,aws-ec2-no-public-ingress-sgr,aws-elb-alb-not-public,aws-iam-no-policy-wildcards,aws-ecr-enforce-immutable-repository,aws-s3-enable-bucket-encryption,aws-s3-encryption-customer-key,aws-sns-topic-encryption-use-cmk,aws-ec2-no-public-ip-subnet,aws-s3-enable-bucket-logging,aws-s3-enable-versioning,aws-rds-specify-backup-retention,aws-ec2-require-vpc-flow-logs-for-all-vpcs,aws-cloudwatch-log-group-customer-key,aws-ecr-repository-customer-key,aws-rds-enable-performance-insights,aws-ssm-secret-use-customer-key
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.15'
      - name: Terraform fmt check
        run: |
          terraform fmt -check -diff terraform/

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
