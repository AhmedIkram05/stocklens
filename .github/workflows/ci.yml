# CI
#
# Runs in parallel across all concerns: linting, type checking, testing
# with coverage, security auditing, Python backend checks, IaC scanning,
# and secret scanning. Every check must pass before merge.
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Prettier check
        run: |
          node node_modules/prettier/bin/prettier.cjs --version
          node node_modules/prettier/bin/prettier.cjs --check .
      - run: ./node_modules/.bin/eslint frontend/src/

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test -- --coverage
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --omit=dev || true

  rust:
    name: Rust (features-engine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ml/features-engine
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install numpy
      - name: Clippy
        run: cargo clippy --all-features -- -D warnings
      - name: Tests
        run: cargo test

  python:
    name: Python Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Ruff check
        run: |
          pip install ruff
          ruff check backend/
          ruff format --check backend/
      - name: Build Rust extension
        run: |
          pip install maturin
          cd backend/ml/features-engine
          maturin develop
      - name: Pytest
        run: |
          pip install ".[dev]"
          cd backend && pytest -q

  iac:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
