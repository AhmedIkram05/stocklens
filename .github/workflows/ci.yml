# CI
#
# Runs in parallel across all concerns: linting, type checking, testing
# with coverage, security auditing, Python backend checks, IaC scanning,
# and secret scanning. Every check must pass before merge.
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Prettier check
        run: |
          node node_modules/prettier/bin/prettier.cjs --version
          node node_modules/prettier/bin/prettier.cjs --check .
      - run: ./node_modules/.bin/eslint frontend/src/

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test -- --coverage
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --omit=dev || true

  rust:
    name: Rust (features-engine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ml/features-engine
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Clippy
        run: cargo clippy --all-features -- -D warnings
      - name: Tests
        run: cargo test

  python:
    name: Python Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Set up virtual environment
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/python -c "import sys; print(sys.executable)"
      - name: Ruff check
        run: |
          ./venv/bin/pip install ruff
          ./venv/bin/ruff check backend/
          ./venv/bin/ruff format --check backend/
      - name: Build Rust extension
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/venv
        run: |
          ./venv/bin/pip install maturin
          cd backend/ml/features-engine
          ${{ github.workspace }}/venv/bin/python -m maturin develop
      - name: Pytest
        run: |
          cd backend && ${{ github.workspace }}/venv/bin/pip install ".[dev]"
          ${{ github.workspace }}/venv/bin/pytest -q

  iac:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
      - name: tfsec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          curl -sSL -o /tmp/tfsec \
            https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64
          chmod +x /tmp/tfsec
          /tmp/tfsec terraform/ \
            --soft-fail \
            -e aws-elb-http-not-used,aws-ecs-no-plaintext-secrets,aws-ec2-no-public-egress-sgr,aws-ec2-no-public-ingress-sgr,aws-elb-alb-not-public,aws-iam-no-policy-wildcards,aws-ecr-enforce-immutable-repository,aws-s3-enable-bucket-encryption,aws-s3-encryption-customer-key,aws-sns-topic-encryption-use-cmk,aws-ec2-no-public-ip-subnet,aws-s3-enable-bucket-logging,aws-s3-enable-versioning,aws-rds-specify-backup-retention,aws-ec2-require-vpc-flow-logs-for-all-vpcs,aws-cloudwatch-log-group-customer-key,aws-ecr-repository-customer-key,aws-rds-enable-performance-insights,aws-ssm-secret-use-customer-key

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
