# Pre-commit hooks mirroring CI lint checks.
# Install:  pre-commit install
# Run all:  pre-commit run --all-files
# Skip:     SKIP=hook_id git commit -m "..."

repos:
  # ── Basic file hygiene ───────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: tsconfig\.json$
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── JS/TS lint (mirrors CI: ESLint + Prettier) ──────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx --no-install eslint --fix
        language: system
        types_or: [ts, tsx]
        require_serial: true
      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        types_or: [javascript, jsx, ts, tsx, json, css, markdown, yaml]
