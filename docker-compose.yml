services:
  postgres:
    image: postgres:18-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: stocklens
      POSTGRES_PASSWORD: stocklens
      POSTGRES_DB: stocklens
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stocklens']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql
    restart: unless-stopped

  postgres_test:
    image: postgres:18-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: stocklens
      POSTGRES_PASSWORD: stocklens
      POSTGRES_DB: stocklens_test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stocklens -d stocklens_test']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - test
    restart: unless-stopped

  redis:
    image: redis:8.8-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mlflow:
    image: python:3.12-slim
    ports:
      - '5001:5001'
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5001
      MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow/mlflow.db
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
      MLFLOW_SERVER_ALLOWED_HOSTS: '*'
    command: >
      sh -c "pip install mlflow>=3.14.0 --quiet &&
             mlflow server --host 0.0.0.0 --port 5001
             --backend-store-uri sqlite:///mlflow/mlflow.db
             --default-artifact-root /mlflow/artifacts"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; exit(urllib.request.urlopen(\"http://localhost:5001\").status != 200)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  ml:
    image: python:3.12-slim
    working_dir: /app
    profiles:
      - ml
    environment:
      DATABASE_URL: postgresql+asyncpg://stocklens:stocklens@postgres:5432/stocklens
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
      MODEL_ARTIFACT_DIR: /model_artifacts/champion
      MLFLOW_ENABLE_SYSTEM_METRICS_LOGGING: 'true'
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    volumes:
      - ./backend/ml:/app/ml
      - model_artifacts:/model_artifacts
      - mlflow_data:/mlflow
    command: >
      sh -c "pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu mlflow>=3.14.0 scikit-learn>=1.6.0 numpy pandas boto3 && python -m ml.pipeline"
    # No ports - runs on-demand via: docker compose run ml python -m ml.pipeline

  backend:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://stocklens:stocklens@postgres:5432/stocklens
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-jwt-secret-key-change-in-production
      ENVIRONMENT: development
      STRUCTLOG_LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./backend/src:/app/src
      - ./backend/ml:/app/ml
      - model_artifacts:/model_artifacts
    restart: unless-stopped

  pytest:
    build:
      context: ./backend
    profiles:
      - test
    env_file: ./backend/.env
    environment:
      HOME: /tmp
      DATABASE_URL: postgresql+asyncpg://stocklens:stocklens@postgres_test:5432/stocklens_test
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: test-jwt-secret-key-32-chars-minimum
      ENVIRONMENT: test
      STRUCTLOG_LOG_LEVEL: WARNING
      RATE_LIMIT_LOGIN: 1000/second
      RATE_LIMIT_DEFAULT: 1000/second
    depends_on:
      postgres:
        condition: service_healthy
      postgres_test:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/ml:/app/ml
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/.env:/app/.env
    command: >
      sh -c "UV_CACHE_DIR=/tmp/uv-cache uv sync --extra dev --index-strategy unsafe-best-match && uv pip install --no-deps /app/wheels/features_engine*.whl && pytest -v -W 'ignore::DeprecationWarning:slowapi' --cov=src --cov-report=term-missing --cov-report=xml --tb=short"

volumes:
  pgdata:
  mlflow_data:
  model_artifacts:
